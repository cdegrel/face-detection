<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Detection & Recognition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .video-section {
            flex: 1;
            background: #000;
            overflow: hidden;
        }

        #video-stream {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .sidebar {
            width: 380px;
            background: #252525;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            color: #fff;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #333;
            background: #1a1a1a;
        }

        .sidebar-header h1 {
            font-size: 20px;
            font-weight: 600;
            margin: 0;
        }

        .sidebar-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #999;
        }

        .section-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        select {
            padding: 10px 12px;
            background: #333;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        select:hover {
            border-color: #555;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .stat-box {
            background: #333;
            border-radius: 6px;
            padding: 16px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 600;
            color: #fff;
        }

        .btn-add {
            padding: 12px 16px;
            background: #667eea;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background: #5568d3;
        }

        .references-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
        }

        .reference-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: #333;
            border-radius: 6px;
            font-size: 14px;
        }

        .reference-item span {
            color: #fff;
        }

        .btn-delete {
            background: #dc3545;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .empty-state {
            text-align: center;
            padding: 20px 10px;
            color: #666;
            font-size: 13px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #252525;
            padding: 30px;
            border-radius: 8px;
            min-width: 350px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-content h3 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .modal-content input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 16px;
            background: #333;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-save {
            background: #667eea;
            color: white;
        }

        .btn-save:hover {
            background: #5568d3;
        }

        .btn-cancel {
            background: #444;
            color: #fff;
        }

        .btn-cancel:hover {
            background: #555;
        }

        .alert {
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .alert-success {
            background: #1e5631;
            color: #4ade80;
            border-left: 3px solid #4ade80;
        }

        .alert-error {
            background: #5f1818;
            color: #ff6b6b;
            border-left: 3px solid #ff6b6b;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #2a2a2a;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-section">
            <canvas id="canvas" style="width: 100%; height: 100%; display: none;"></canvas>
            <video id="video" style="width: 100%; height: 100%; display: none; object-fit: cover;"></video>
            <img id="video-stream" style="width: 100%; height: 100%; object-fit: cover; display: none;" alt="Video Stream">
        </div>

        <div class="sidebar">
            <div class="sidebar-header">
                <h1>Face Detection</h1>
            </div>

            <div class="sidebar-content">
                <!-- Type source vidéo -->
                <div class="section">
                    <div class="section-title">Source vidéo</div>
                    <div class="section-content">
                        <select id="source-type-select" onchange="changeSourceType()">
                            <option value="local">Caméra locale</option>
                            <option value="rtsp">Flux RTSP</option>
                        </select>
                    </div>
                </div>

                <!-- RTSP URL (hidden by default) -->
                <div class="section" id="rtsp-section" style="display: none;">
                    <div class="section-title">URL RTSP</div>
                    <div class="section-content">
                        <input type="text" id="rtsp-url" placeholder="rtsp://192.168.1.100:554/stream" style="padding: 10px 12px; background: #333; border: 1px solid #444; border-radius: 6px; color: #fff; font-size: 14px;">
                        <button class="btn-add" onclick="connectRTSP()" style="margin-top: 8px;">Connecter</button>
                    </div>
                </div>

                <!-- Caméra locale (hidden by default) -->
                <div class="section" id="camera-section">
                    <div class="section-title">Caméra</div>
                    <div class="section-content">
                        <select id="camera-select" onchange="changeCamera()">
                            <option value="">Chargement...</option>
                        </select>
                    </div>
                </div>


                <!-- Visages sauvegardés -->
                <div class="section">
                    <div class="section-title">Visages sauvegardés</div>
                    <div class="references-list" id="references-list">
                        <div class="empty-state">Chargement...</div>
                    </div>
                    <button class="btn-add" onclick="openAddFaceModal()" style="margin-top: 12px;">Ajouter une personne</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="add-face-modal" class="modal">
        <div class="modal-content">
            <h3>Ajouter une personne</h3>
            <div id="modal-alert"></div>
            <input type="text" id="face-name-input" placeholder="Nom" autofocus />
            <div class="modal-buttons">
                <button class="modal-btn btn-save" onclick="saveFace()">Sauvegarder</button>
                <button class="modal-btn btn-cancel" onclick="closeAddFaceModal()">Annuler</button>
            </div>
        </div>
    </div>

    <script>
        let currentSource = 'local';
        let videoStream = null;
        let processingFrame = false;

        function changeSourceType() {
            const sourceType = document.getElementById('source-type-select').value;
            currentSource = sourceType;

            document.getElementById('camera-section').style.display = sourceType === 'local' ? 'block' : 'none';
            document.getElementById('rtsp-section').style.display = sourceType === 'rtsp' ? 'block' : 'none';

            if (sourceType === 'local') {
                initializeLocalCamera();
            } else {
                stopLocalCamera();
            }
        }

        async function initializeLocalCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 } } });
                const video = document.getElementById('video');
                video.srcObject = stream;
                videoStream = stream;
                video.play();

                document.getElementById('video').style.display = 'block';
                document.getElementById('video-stream').style.display = 'none';
                document.getElementById('canvas').style.display = 'none';

                captureFrames();
            } catch (error) {
                alert('Erreur caméra: ' + error.message);
            }
        }

        function stopLocalCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
        }

        function captureFrames() {
            if (currentSource !== 'local' || !videoStream) return;

            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            function processFrame() {
                if (currentSource !== 'local' || !videoStream) return;

                ctx.drawImage(video, 0, 0);
                canvas.toBlob(blob => {
                    const formData = new FormData();
                    formData.append('frame', blob);

                    fetch('/process_frame', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.blob())
                    .then(blob => {
                        const url = URL.createObjectURL(blob);
                        document.getElementById('video-stream').src = url;
                        document.getElementById('video-stream').style.display = 'block';
                        document.getElementById('video').style.display = 'none';

                        setTimeout(processFrame, 100);
                    })
                    .catch(error => {
                        console.error('Frame processing error:', error);
                        setTimeout(processFrame, 100);
                    });
                }, 'image/jpeg', 0.8);
            }

            processFrame();
        }

        function connectRTSP() {
            const url = document.getElementById('rtsp-url').value.trim();
            if (!url) {
                alert('Entrez une URL RTSP');
                return;
            }

            fetch('/set_rtsp_source', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('video-stream').style.display = 'block';
                    document.getElementById('video').style.display = 'none';
                    document.getElementById('video-stream').src = '{{ url_for("rtsp_feed") }}?' + new Date().getTime();
                } else {
                    alert('Erreur RTSP: ' + data.message);
                }
            });
        }

        function loadCameras() {
            fetch('/get_cameras')
                .then(response => response.json())
                .then(data => {
                    const select = document.getElementById('camera-select');
                    select.innerHTML = '';

                    if (data.cameras.length === 0) {
                        select.innerHTML = '<option disabled>Aucune caméra</option>';
                        return;
                    }

                    data.cameras.forEach(index => {
                        const option = document.createElement('option');
                        option.value = index;
                        option.textContent = `Caméra ${index}`;
                        if (index === data.current) {
                            option.selected = true;
                        }
                        select.appendChild(option);
                    });
                });
        }

        function changeCamera() {
            // Camera change is handled by local video stream
            loadCameras();
        }


        function loadReferences() {
            fetch('/get_references')
                .then(response => response.json())
                .then(data => {
                    const list = document.getElementById('references-list');
                    list.innerHTML = '';

                    if (data.length === 0) {
                        list.innerHTML = '<div class="empty-state">Aucun visage sauvegardé</div>';
                        return;
                    }

                    data.forEach(name => {
                        const item = document.createElement('div');
                        item.className = 'reference-item';
                        item.innerHTML = `
                            <span>${name}</span>
                            <button class="btn-delete" onclick="deleteReference('${name}')">Suppr.</button>
                        `;
                        list.appendChild(item);
                    });
                });
        }

        function deleteReference(name) {
            if (confirm(`Supprimer le visage "${name}" ?`)) {
                fetch('/delete_reference', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: name })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        loadReferences();
                    }
                });
            }
        }

        function openAddFaceModal() {
            document.getElementById('add-face-modal').classList.add('active');
            document.getElementById('face-name-input').focus();
        }

        function closeAddFaceModal() {
            document.getElementById('add-face-modal').classList.remove('active');
            document.getElementById('face-name-input').value = '';
            document.getElementById('modal-alert').innerHTML = '';
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('modal-alert');
            alertDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        }

        function saveFace() {
            const name = document.getElementById('face-name-input').value.trim();

            if (!name) {
                showAlert('Entrez un nom valide', 'error');
                return;
            }

            fetch('/save_reference', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name: name })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    showAlert(data.message, 'success');
                    setTimeout(() => {
                        closeAddFaceModal();
                        loadReferences();
                    }, 1000);
                } else {
                    showAlert(data.message, 'error');
                }
            })
            .catch(error => {
                showAlert('Erreur: ' + error, 'error');
            });
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.getElementById('add-face-modal').classList.contains('active')) {
                saveFace();
            }
        });

        loadCameras();
        loadReferences();
        initializeLocalCamera();
    </script>
</body>
</html>
